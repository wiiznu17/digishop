worker_processes 1;

error_log /var/log/nginx/digishop_error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  access_log /var/log/nginx/digishop_access.log;

  sendfile on;
  keepalive_timeout 65;

  map $http_origin $cors_allow_origin {
    default "";
    "~^https?://localhost:3000$" $http_origin;
    "~^https?://localhost:3001$" $http_origin;
    "~^https?://localhost:3002$" $http_origin;
  }

  upstream auth_service {
    server 127.0.0.1:4001;
  }

  upstream customer_service {
    server 127.0.0.1:4002;
  }

  upstream merchant_service {
    server 127.0.0.1:4003;
  }

  upstream portal_service {
    server 127.0.0.1:4004;
  }

  server {
    listen 4000;
    server_name localhost;

    location /healthz {
      return 200 "OK";
      add_header Content-Type text/plain;
    }

    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin $cors_allow_origin always;
      add_header Access-Control-Allow-Credentials "true" always;
      add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, X-CSRF-Token, Accept" always;
      add_header Vary "Origin" always;
      add_header Content-Length 0;
      add_header Content-Type text/plain;
      return 204;
    }

    add_header Access-Control-Allow-Origin $cors_allow_origin always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With, X-CSRF-Token, Accept" always;
    add_header Vary "Origin" always;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cookie_domain ~.* localhost;

    location /api/auth {
      proxy_pass http://auth_service;
    }

    location /api/customer {
      proxy_pass http://customer_service;
    }

    location /api/merchant {
      proxy_pass http://merchant_service;
    }

    location /api/admin {
      proxy_pass http://portal_service;
    }
  }
}
