# ── Backend Services ─────────────────────────────────────────────────────────

apiVersion: apps/v1
kind: Deployment
metadata:
  name: authen-service
  labels:
    app: authen-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authen-service
  template:
    metadata:
      labels:
        app: authen-service
    spec:
      containers:
      - name: authen-service
        image: ghcr.io/wiiznu/authen-service
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 4001
        readinessProbe:
          httpGet: { path: /api/auth/healthz, port: 4001 }
          initialDelaySeconds: 5
        livenessProbe:
          httpGet: { path: /api/auth/healthz, port: 4001 }
        resources:
          requests: { cpu: 100m, memory: 128Mi }
          limits: { cpu: 500m, memory: 256Mi }
        envFrom:
        - secretRef: { name: digishop-secrets }
        env:
        - name: PORT
          value: "4001"

