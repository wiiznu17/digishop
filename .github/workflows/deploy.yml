name: Deploy to Kubernetes (Production)

# ไว้สำหรับรันมือเท่านั้น (Manual Trigger) ป้องกันไม่ให้รันจริงอัตโนมัติ
on:
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [
          'authen-service',
          'customer-service2',
          'customer2',
          'merchant',
          'merchant-service',
          'merchant-worker',
          'portal',
          'portal-service'
        ]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/${{ matrix.service }}/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Kubeconfig
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Deploy to Kubernetes
        run: |
          # จำลองการ Apply Manifest ไปยัง Cluster จริง
          # ในที่นี้ใช้ Kustomize บนโฟลเดอร์ .k8s/overlays/dev (หรือเปลี่ยนเป็น prod ในอนาคต)
          kubectl apply -k .k8s/overlays/dev
          
          # สั่ง Restart ทุก Deployment เพื่อให้ใช้ Image ใหม่ล่าสุด
          kubectl rollout restart deployment -n default
