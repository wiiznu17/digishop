stages:
  - install
  - build
  - deploy

variables:
  NODE_ENV: production
  NPM_CONFIG_CACHE: .npm

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .npm/
    - node_modules/
    - apps/**/node_modules/
    - packages/**/node_modules/

install:
  stage: install
  image: node:20
  script:
    # ติดตั้งแบบ workspaces เพื่อให้ลิงก์ @digishop/db เข้ากับ portal-service
    - npm ci --workspaces --include-workspace-root
  artifacts:
    expire_in: 1h
    paths:
      - node_modules/
      - apps/**/node_modules/
      - packages/**/node_modules/

build:
  stage: build
  image: node:20
  needs: ["install"]
  script:
    # ไม่ต้อง npm ci ซ้ำอีกครั้ง (มีจาก stage install แล้ว)
    # คอมไพล์ db ก่อน แล้วค่อย portal-service
    - npm run -w packages/db build
    - npm run -w apps/portal-service build
  artifacts:
    expire_in: 1h
    paths:
      - apps/portal-service/dist

.deploy_template: &deploy_template
  stage: deploy
  image: node:20
  only:
    - feature/merchant
  before_script:
    - 'echo "🔍 RAILWAY_TOKEN length: ${#RAILWAY_TOKEN}"'
    - npm i -g @railway/cli
    - '[ -n "$RAILWAY_TOKEN" ] || (echo "❌ Missing RAILWAY_TOKEN"; exit 1)'
    - railway --version
    - if [ -n "$RAILWAY_PROJECT_ID" ]; then export RAILWAY_PROJECT_ID; fi
    - if [ -n "$RAILWAY_ENVIRONMENT" ]; then export RAILWAY_ENVIRONMENT; fi

deploy_portal_service:
  <<: *deploy_template
  needs: ["build"]
  script:
    # อัปจาก root (ไฟล์จะถูกกรองด้วย .railwayignore ให้เหลือแค่ของที่ต้องใช้)
    - railway up . --service portal-service --environment "$RAILWAY_ENVIRONMENT" --ci --path-as-root --verbose
