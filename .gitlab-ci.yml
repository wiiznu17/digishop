stages:
  - install
  - build
  - deploy

variables:
  NODE_ENV: production
  NPM_CONFIG_CACHE: .npm

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .npm/
    - node_modules/
    - apps/**/node_modules/
    - packages/**/node_modules/

install:
  stage: install
  image: node:20
  script:
    - npm ci --include=dev
  artifacts:
    expire_in: 1h
    paths:
      - node_modules/
      - apps/**/node_modules/
      - packages/**/node_modules/

build:
  stage: build
  image: node:20
  needs: ["install"]
  script:
    - npm ci --include=dev
    - npm exec -w packages/db -- tsc -p tsconfig.json
    - npm run build -w apps/portal-service
    # - npm run build -w apps/merchant-service
    # - npm run build -w apps/merchant-worker
    # - npm run build -w apps/authen-service
    # - npm run build -w apps/gateway-service
  artifacts:
    expire_in: 1h
    paths:
      - apps/portal-service/dist
      # - apps/merchant-service/dist
      # - apps/merchant-worker/dist
      # - apps/authen-service/dist
      # - apps/gateway-service/dist

.deploy_template: &deploy_template
  stage: deploy
  image: node:20
  only:
    - feature/merchant
  before_script:
    - 'echo "🔍 RAILWAY_TOKEN length: ${#RAILWAY_TOKEN}"'
    - npm i -g @railway/cli
    - '[ -n "$RAILWAY_TOKEN" ] || (echo "❌ Missing RAILWAY_TOKEN"; exit 1)'
    - railway --version
    - if [ -n "$RAILWAY_PROJECT_ID" ]; then export RAILWAY_PROJECT_ID; fi
    - if [ -n "$RAILWAY_ENVIRONMENT" ]; then export RAILWAY_ENVIRONMENT; fi

deploy_portal_service:
  <<: *deploy_template
  needs: ["build"]
  script:
    - railway up apps/portal-service --service portal-service --ci

