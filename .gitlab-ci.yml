stages:
  - install
  - build
  - deploy

variables:
  NODE_ENV: production
  NPM_CONFIG_CACHE: .npm

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - .npm/
    - node_modules/
    - apps/**/node_modules/
    - packages/**/node_modules/

install:
  stage: install
  image: node:20
  script:
    - npm ci
  artifacts:
    expire_in: 1h
    paths:
      - node_modules/
      - apps/**/node_modules/
      - packages/**/node_modules/

build:
  stage: build
  image: node:20
  needs: ["install"]             # ดึง artifacts ของ install มา
  script:
    - npm ci                     # กันเหนียว ติดตั้งอีกรอบ (ใช้ cache/arts เร็ว)
    - npm run build -w packages/db
    - npm run build -w apps/portal-service
    - npm run build -w apps/merchant-service
    # - npm run build -w apps/customer-service
    - npm run build -w apps/merchant-worker
    - npm run build -w apps/authen-service
    - npm run build -w apps/gateway-service
  artifacts:
    expire_in: 1h
    paths:
      - apps/portal-service/dist
      - apps/merchant-service/dist
      # - apps/customer-service/dist
      - apps/merchant-worker/dist
      - apps/authen-service/dist
      - apps/gateway-service/dist

.deploy_template: &deploy_template
  stage: deploy
  image: node:20
  only:
    - feature/merchant
  before_script:
    - npm i -g @railway/cli
    - railway login --token "$RAILWAY_TOKEN"

deploy_portal_service:
  <<: *deploy_template
  needs: ["build"]               # ให้ deploy รอ build เสมอ
  script:
    - railway up --service portal-service --base-dir apps/portal-service

deploy_merchant_service:
  <<: *deploy_template
  needs: ["build"]
  script:
    - railway up --service merchant-service --base-dir apps/merchant-service

# deploy_customer_service:
#   <<: *deploy_template
#   needs: ["build"]
#   script:
#     - railway up --service customer-service --base-dir apps/customer-service

deploy_merchant_worker:
  <<: *deploy_template
  needs: ["build"]
  script:
    - railway up --service merchant-worker --base-dir apps/merchant-worker

deploy_authen_service:
  <<: *deploy_template
  needs: ["build"]
  script:
    - railway up --service authen-service --base-dir apps/authen-service

deploy_gateway_service:
  <<: *deploy_template
  needs: ["build"]
  script:
    - railway up --service gateway-service --base-dir apps/gateway-service
